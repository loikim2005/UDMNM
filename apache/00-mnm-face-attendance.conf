# Dat tai: C:\laragon\etc\apache2\alias\00-mnm-face-attendance.conf
# Ghi de file cu neu con dong: Alias ... "C:/laragon/www/mnm/frontend" (sai -> 403)
#
# API: Khuyen nghi goi qua Apache reverse proxy de chi dung 1 domain/port:
#   UI:  http://localhost:8080/mnm/
#   API: http://localhost:8080/mnm/api/  -> proxy toi Flask http://127.0.0.1:5000/
# Yeu cau Apache bat module proxy + proxy_http (Laragon: httpd.conf).

Alias /mnm "C:/laragon/www/mnm"

<Directory "C:/laragon/www/mnm">
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
    DirectoryIndex index.php index.html
</Directory>

# Reverse proxy API -> Flask
ProxyPreserveHost On
ProxyPass        "/mnm/api/"  "http://127.0.0.1:5000/"
ProxyPassReverse "/mnm/api/"  "http://127.0.0.1:5000/"
