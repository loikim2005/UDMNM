<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập — TNU</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-hero">
        <h1>TNU</h1>
        <p>
          Bảng quản trị điểm danh bằng nhận diện khuôn mặt — an toàn, minh bạch,
          phù hợp môi trường giáo dục và doanh nghiệp.
        </p>
      </div>
      <div class="login-panel">
        <div class="login-card">
          <h2>Đăng nhập quản trị</h2>
          <form id="login-form" action="#" method="post">
            <div class="form-group">
              <label for="user">Tên đăng nhập</label>
              <input id="user" name="user" type="text" autocomplete="username" placeholder="Nhập tên đăng nhập" />
